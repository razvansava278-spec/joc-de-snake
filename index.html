<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Snake</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-image: url('fundal.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        h1 { color: #1a73e8; margin-top: 0; }
        
        .container {
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(5px); 
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 650px;
        }

        .butoane-grup {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap; 
            margin-top: 25px;
        }

        /* Stilul butoanelor (acum aplicat pe tag-ul <a>) */
        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            text-decoration: none; /* Elimină sublinierea standard a linkurilor */
            display: inline-block;
        }

        .btn-albastru { background-color: #007bff; }
        .btn-verde { background-color: #28a745; }
        .btn-rosu { background-color: #dc3545; }

        .btn:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.25);
            color: white; /* Menține textul alb la hover */
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Joc de Snake pe matrice 8x8 de LEDuri adresabile individual</h1>
        <p>Creat de Sava Razvan Daniel si Statie Andreea Delia </p>

        <!-- Linkurile către paginile tale noi -->
        <div class="butoane-grup">
            <a href="implementare.html" class="btn btn-albastru">Modul de implementare</a>
            <a href="hardware.html" class="btn btn-verde">Descriere Hardware</a>
            <a href="software.html" class="btn btn-rosu">Descriere Software</a>
        </div>
    </div>

</body>
</html>
