<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descriere Software</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #1e293b; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .container {
            background: #ffffff; 
            padding: 45px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 700px;
            text-align: left;
        }

        h1 { color: #dc2626; margin-top: 0; font-size: 28px; text-align: center; }
        p { color: #334155; font-size: 16px; line-height: 1.6; }
        
        .Inapoi-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #475569;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }

        .Inapoi-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            background-color: #334155;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Descriere Software</h1>
        <hr style="border: 0; height: 1px; background: #e2e8f0; margin-bottom: 20px;">
        
        

        <center><a href="index.html" class="Inapoi-btn">← Înapoi la Panou</a></center>
    </div>

</body>
</html>
